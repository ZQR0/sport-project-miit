<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head lang="ru">
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=K2D&display=swap" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/styles/admin_style.css}">
    <title>Управление преподавателями</title>
</head>
<body>
<div class="header">
    <a class="title" href="/index">ВСЕ НА СПОРТ</a>
    <div class="if_authorized" sec:authorize="isAuthenticated()">
        <div class="authorized_username">
            Приветствуем вас, <span sec:authentication="name"></span>!
        </div>
        <div class="logout_container">
            <a class="logout_link" href="/logout">Выйти</a>
        </div>
    </div>
</div>

<div class="content-container">
    <h1 class="page-title">Управление преподавателями</h1>

    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <div class="form-container">
        <h2 class="form-title">Добавить преподавателя</h2>
        <form th:action="@{/admin/teachers/create}" method="post" class="add-form">
            <div class="form-row">
                <label for="firstName">Имя:</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="form-row">
                <label for="lastName">Фамилия:</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="form-row">
                <label for="patronymic">Отчество:</label>
                <input type="text" id="patronymic" name="patronymic">
            </div>

            <div class="form-row">
                <label for="login">Логин:</label>
                <input type="text" id="login" name="login" required>
            </div>

            <div class="form-row">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-row checkbox-row">
                <input type="checkbox" id="moderator" name="moderator">
                <label for="moderator">Модератор (права администратора)</label>
            </div>

            <div class="form-row">
                <label for="birthday">Дата рождения:</label>
                <input type="date" id="birthday" name="birthday">
            </div>

            <button type="submit" class="submit-button">Создать преподавателя</button>
        </form>
    </div>

    <div class="table-container">
        <h2 class="table-title">Список преподавателей</h2>
        <table class="user-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Фамилия</th>
                <th>Имя</th>
                <th>Отчество</th>
                <th>Логин</th>
                <th>Роль</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="teacher : ${teachers}">
                <td th:text="${teacher.id}"></td>
                <td th:text="${teacher.lastName}"></td>
                <td th:text="${teacher.firstName}"></td>
                <td th:text="${teacher.patronymic != null ? teacher.patronymic : '-'}"></td>
                <td th:text="${teacher.login}"></td>
                <td th:text="${teacher.moderator ? 'Модератор' : 'Преподаватель'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(teachers)}">
                <td colspan="6" class="no-data">Преподаватели не найдены</td>
            </tr>
            </tbody>
        </table>
    </div>

    <a href="/admin/dashboard" class="back-link">Вернуться на главную</a>
</div>

<style>
    .page-title {
        font-family: 'K2D', sans-serif;
        color: rgba(29,108,255,1);
        margin-bottom: 30px;
    }

    .form-container, .table-container {
        background: white;
        border: 1px solid rgba(38,36,36,1);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        width: 90%;
        max-width: 800px;
    }

    .form-title, .table-title {
        font-family: 'K2D', sans-serif;
        color: #333;
        margin-bottom: 20px;
    }

    .form-row {
        margin-bottom: 15px;
    }

    .form-row label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
    }

    .form-row input, .form-row select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
    }

    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .checkbox-row input {
        width: auto;
    }

    .checkbox-row label {
        margin-bottom: 0;
    }

    .message {
        padding: 10px 20px;
        border-radius: 4px;
        margin-bottom: 20px;
        width: 90%;
        max-width: 800px;
    }

    .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .no-data {
        text-align: center;
        color: #666;
    }

    .back-link {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .back-link:hover {
        background-color: #5a6268;
    }
</style>
</body>
</html>
