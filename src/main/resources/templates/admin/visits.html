<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head lang="ru">
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=K2D&display=swap" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/styles/admin_style.css}">
    <title>Посещения</title>
</head>
<body>
<div class="header">
    <a class="title" href="/index">ВСЕ НА СПОРТ</a>
    <div class="if_authorized" sec:authorize="isAuthenticated()">
        <div class="authorized_username">
            Приветствуем вас, <span sec:authentication="name"></span>!
        </div>
        <div class="logout_container">
            <a class="logout_link" href="/logout">Выйти</a>
        </div>
    </div>
</div>

<div class="content-container">
    <h1 class="page-title">Посещения</h1>

    <div th:if="${successMessage}" class="message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message error" th:text="${errorMessage}"></div>

    <div class="form-container">
        <h2 class="form-title">Добавить посещение</h2>
        <form th:action="@{/admin/visits/create}" method="post" class="add-form">
            <div class="form-row">
                <label for="studentLogin">Студент:</label>
                <select id="studentLogin" name="studentLogin" required>
                    <option value="">Выберите студента</option>
                    <option th:each="student : ${students}"
                            th:value="${student.login}"
                            th:text="${student.lastName + ' ' + student.firstName + ' (' + student.login + ')'}">
                    </option>
                </select>
            </div>
            <div class="form-row">
                <label for="lessonId">Занятие:</label>
                <select id="lessonId" name="lessonId" required>
                    <option value="">Выберите занятие</option>
                    <option th:each="lesson : ${lessons}"
                            th:value="${lesson.id}"
                            th:text="${lesson.dateOfLesson + ' | ' + lesson.disciplineName + ' | ' + lesson.teacherFullName}">
                    </option>
                </select>
            </div>
            <div class="form-row checkbox-row">
                <input type="checkbox" id="isExists" name="isExists" checked>
                <label for="isExists">Присутствовал</label>
            </div>
            <button type="submit" class="submit-button">Добавить посещение</button>
        </form>
    </div>

    <div class="table-container">
        <h2 class="table-title">Список посещений</h2>
        <table class="user-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Студент</th>
                <th>Занятие</th>
                <th>Статус</th>
                <th>Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="visit : ${visits}">
                <td th:text="${visit.id}"></td>
                <td th:text="${visit.studentLogin}"></td>
                <td th:text="${visit.lessonId}"></td>
                <td>
                    <span th:if="${visit.isExists}" class="status-present">Присутствовал</span>
                    <span th:if="${!visit.isExists}" class="status-absent">Отсутствовал</span>
                </td>
                <td class="actions-cell">
                    <form th:action="@{/admin/visits/update/{id}(id=${visit.id})}" method="post" class="inline-form">
                        <input type="hidden" name="isExists" th:value="${!visit.isExists}">
                        <button type="submit" class="toggle-button" th:if="${visit.isExists}">Отметить как отсутствовал</button>
                        <button type="submit" class="toggle-button present" th:if="${!visit.isExists}">Отметить как присутствовал</button>
                    </form>
                    <form th:action="@{/admin/visits/delete/{id}(id=${visit.id})}" method="post" class="inline-form" onsubmit="return confirm('Удалить запись о посещении?')">
                        <button type="submit" class="delete-button">Удалить</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(visits)}">
                <td colspan="5" class="no-data">Посещения не найдены</td>
            </tr>
            </tbody>
        </table>
    </div>

    <a href="/admin/dashboard" class="back-link">Вернуться на главную</a>
</div>

<style>
    .page-title {
        font-family: 'K2D', sans-serif;
        color: rgba(29,108,255,1);
        margin-bottom: 30px;
    }
    .form-container, .table-container {
        background: white;
        border: 1px solid rgba(38,36,36,1);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        width: 90%;
        max-width: 800px;
    }
    .form-title, .table-title {
        font-family: 'K2D', sans-serif;
        color: #333;
        margin-bottom: 20px;
    }
    .form-row {
        margin-bottom: 15px;
    }
    .form-row label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
    }
    .form-row input, .form-row select, .form-row textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
    }
    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .checkbox-row input {
        width: auto;
    }
    .checkbox-row label {
        margin-bottom: 0;
    }
    .message {
        padding: 10px 20px;
        border-radius: 4px;
        margin-bottom: 20px;
        width: 90%;
        max-width: 800px;
    }
    .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
    .no-data {
        text-align: center;
        color: #666;
    }
    .status-present {
        color: #28a745;
        font-weight: 500;
    }
    .status-absent {
        color: #dc3545;
        font-weight: 500;
    }
    .toggle-button, .delete-button {
        padding: 5px 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        color: white;
    }
    .toggle-button {
        background-color: #dc3545;
    }
    .toggle-button.present {
        background-color: #28a745;
    }
    .toggle-button:hover, .delete-button:hover {
        opacity: 0.8;
    }
    .delete-button {
        background-color: #dc3545;
        margin-left: 4px;
    }
    .inline-form {
        display: inline-block;
        margin: 0;
    }
    .back-link {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }
    .back-link:hover {
        background-color: #5a6268;
    }
</style>
</body>
</html>
